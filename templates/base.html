{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHR System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: #0d6efd;
        }

        .navbar-brand,
        .nav-link {
            color: white !important;
        }

        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #334155;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        footer {
            background: #0d6efd;
            color: white;
            padding: 10px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">AI EHR System</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 sidebar">
            <h4 class="text-center">Dashboard</h4>
            <a href="#"><i class="fa fa-home"></i> Home</a>
            <a href="#"><i class="fa fa-user-doctor"></i> Doctors</a>
            <a href="#"><i class="fa fa-users"></i> Patients</a>
            <a href="#"><i class="fa fa-calendar"></i> Appointments</a>
            <a href="#"><i class="fa fa-file-medical"></i> Reports</a>
            <a href="#"><i class="fa fa-right-from-bracket"></i> Logout</a>
        </div>

        <div class="col-md-10 p-4">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

<footer>
    AI Powered Electronic Health Record System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
