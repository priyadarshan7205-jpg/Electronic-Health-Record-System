<!DOCTYPE html>
<html lang="en">
    {% extends "playout/base.html" %}
{% block patientblock %}
<head>
    <meta charset="UTF-8">
    <title>Test Checklist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }
        .checklist-container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .checklist-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .checklist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 8px;
            transition: background 0.2s ease-in-out;
            margin-bottom: 10px;
        }
        .checklist-item:hover {
            background: #f1f1f1;
        }
        .checklist-item label {
            flex: 1;
            cursor: pointer;
        }
        .checklist-item input[type="checkbox"] {
            transform: scale(1.2);
            margin-left: 10px;
            cursor: pointer;
        }
        .submit-btn {
            display: block;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="checklist-container">
    <div class="checklist-title">Welcome {{ user.Name }}, Select Your Tests</div>
    <form method="post">
        {% csrf_token %}

        {% for data in testdata %}
        <div class="checklist-item">
            <label>{{ data.test_name }} - ₹{{ data.test_Price }}</label>
            <input type="checkbox" name="selected_tests" value="{{ data.test_id }}">
        </div>
        {% endfor %}

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>


</body>
{% endblock %}
</html>
