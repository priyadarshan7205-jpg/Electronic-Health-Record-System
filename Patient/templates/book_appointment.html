{% extends "playout/base.html" %}
{% block patientblock %}
<style>
  body {
    background: #f5f7fa;
    font-family: Arial, sans-serif;
  }
  .form-container {
    max-width: 600px;
    margin: 50px auto;
    background: #fff;
    padding: 25px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
  .form-container h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #4a4a9c;
  }
  .form-group {
    margin-bottom: 15px;
  }
  .form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
    color: #333;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    font-size: 14px;
  }
  .form-group input[readonly] {
    background: #f0f0f0;
  }
  textarea {
    resize: none;
  }
  .submit-btn {
    width: 100%;
    padding: 12px;
    background: #4a4a9c;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s ease;
  }
  .submit-btn:hover {
    background: #37377a;
  }
</style>

<div class="form-container">
  <h2>Book Appointment</h2>
  <form method="post" action="{% url 'take_appointment' %}">
    {% csrf_token %}

    <!-- Doctor Info -->
    <div class="form-group">
      <label>Doctor Name</label>
      <input type="text" name="dname" value="{{ ddata.Name }}" readonly>
    </div>
    <div class="form-group">
      <label>Doctor Email</label>
      <input type="text" name="demail" value="{{ ddata.Email }}" readonly>
    </div>
    <div class="form-group">
      <label>Doctor Contact</label>
      <input type="text" name="dmobile" value="{{ ddata.Mobile }}" readonly>
    </div>

    <!-- Patient Info -->
    <div class="form-group">
      <label>Patient Name</label>
      <input type="text" name="pname" value="{{ pdata.Name }}" readonly>
    </div>
    <div class="form-group">
      <label>Patient Email</label>
      <input type="text" name="pemail" value="{{ pdata.Email }}" readonly>
    </div>
    <div class="form-group">
      <label>Patient Contact</label>
      <input type="text" name="pmobile" value="{{ pdata.Mobile }}" readonly>
    </div>
    <div class="form-group">
      <label>Patient DOB</label>
      <input type="text" name="pdob" value="{{ pdata.DOB|date:'Y-m-d' }}" readonly>
    </div>
    <div class="form-group">
      <label>Patient Address</label>
      <input type="text" name="paddress" value="{{ pdata.Address }}" readonly>
    </div>
    <div class="form-group">
      <label>Gender</label>
      <input type="text" name="pgender" value="{{ pdata.Gender }}" readonly>
    </div>

    <!-- Diseases -->
    <div class="form-group">
      <label>Diseases / Symptoms</label>
      <textarea name="disease" rows="3" placeholder="Enter patient's health issue..."></textarea>
    </div>

    <!-- Submit -->
    <button type="submit" class="submit-btn" name="btn" value="BOOK_Appointment">
      Book Appointment
    </button>
  </form>
</div>
{% endblock %}
