{% extends "playout/base.html" %}
{% block patientblock %}
<style>
  .profile-container {
    max-width: 700px;
    margin: 50px auto;
    background: #fff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  }
  .profile-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #4a4a9c;
  }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
    color: #444;
  }
  input[type="text"],
  input[type="email"],
  input[type="file"],
  textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.3s;
  }
  input[type="text"]:focus,
  input[type="email"]:focus,
  textarea:focus {
    border-color: #4a4a9c;
    outline: none;
    box-shadow: 0 0 5px rgba(74,74,156,0.4);
  }
  textarea {
    resize: vertical;
    min-height: 80px;
  }
  .btn-submit {
    width: 100%;
    padding: 12px;
    background: #4a4a9c;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn-submit:hover {
    background: #37377a;
  }
</style>

<div class="profile-container">
  <h2>Update Your Profile</h2>
  <form method="post" enctype="multipart/form-data" action="{% url 'patientprofile' %}">
    {% csrf_token %}

    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" value="{{pdata.Name}}">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{pdata.Email}}">
    </div>

    <div class="form-group">
      <label>Mobile</label>
      <input type="text" name="mobile" value="{{pdata.Mobile}}">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="text" name="pwd" value="{{pdata.Password}}">
    </div>

    <div class="form-group">
      <label>Address</label>
      <input type="text" name="ads" value="{{pdata.Address}}">
    </div>

    <div class="form-group">
      <label>Date of Birth</label>
      <input type="text" name="dob" value="{{pdata.DOB|date:'Y-m-d'}}">
    </div>

    <div class="form-group">
      <label>Gender</label>
      <input type="text" name="gender" value="{{pdata.Gender}}">
    </div>

    <div class="form-group">
      <label>Profile Image</label>
      <input type="file" name="image">
    </div>

    <div class="form-group">
      <label>Upload Document</label>
      <input type="file" name="uploaded_doc">
    </div>

    <div class="form-group">
      <label>Diseases</label>
      <textarea name="disesase"></textarea>
    </div>

    <input type="submit" value="Update" name="btn" class="btn-submit">
  </form>
</div>
{% endblock %}
