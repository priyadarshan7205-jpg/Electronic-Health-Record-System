<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Live Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #8b5cf6 0%, transparent 30%),
                        radial-gradient(circle at bottom right, #22d3ee 0%, transparent 28%),
                        #f8f7ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .chat-card {
            max-width: 720px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 32px 90px rgba(99, 102, 241, 0.14);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(139, 92, 246, 0.18);
        }
        .chat-card .badge {
            background: rgba(124, 58, 237, 0.12);
            color: #6d28d9;
            font-weight: 700;
        }
        .copilot-link {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="chat-card p-5">
        <div class="text-center mb-4">
            <span class="badge rounded-pill mb-3">Copilot Live Chat</span>
            <h1 class="mb-3">Your AI assistant is ready</h1>
            <p class="text-muted fs-5">Click the button below to launch a Copilot-style chat experience for fast support.</p>
        </div>
        <div class="d-grid gap-3">
            <a href="https://copilot.microsoft.com/" target="_blank" rel="noopener noreferrer" class="btn btn-lg btn-primary copilot-link">Open Copilot Chat</a>
            <div class="alert alert-info rounded-4 mb-0" role="alert">
                This page connects your live chat button to a Copilot-style chat experience. If you want, I can also integrate an on-site embedded chat widget.
            </div>
        </div>
    </div>
</body>
</html>
